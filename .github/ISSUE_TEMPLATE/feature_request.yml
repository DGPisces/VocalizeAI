name: "Feature request"
description: "Suggest an enhancement"
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: "What problem are you trying to solve?"
      description: "Describe the current limitation or pain point. A good feature request starts with the problem, not the solution."
      placeholder: "Right now, when I try to ..., I can't ..."
    validations:
      required: true

  - type: textarea
    id: proposed-solution
    attributes:
      label: "Proposed solution"
      description: "What would you like to see? Describe the behavior you want."
      placeholder: "I'd like the system to ..."
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: "Alternatives considered"
      description: "Have you considered other approaches? Why do you prefer your proposal?"
      placeholder: "I also considered ... but ..."
    validations:
      required: false

  - type: textarea
    id: context
    attributes:
      label: "Additional context"
      description: "Any other context, screenshots, or references that would help."
    validations:
      required: false
