name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing release tag, for example v0.1.0'
        required: true
        type: string

permissions:
  contents: write

jobs:
  macos-release:
    name: Build signed macOS release
    runs-on: macos-14
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set release tag
        id: release
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            tag="${{ inputs.tag }}"
          else
            tag="${GITHUB_REF_NAME}"
          fi
          case "$tag" in
            v*) ;;
            *) echo "Release tag must start with v: $tag" >&2; exit 2 ;;
          esac
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install backend dependencies
        run: |
          python -m venv .venv
          . .venv/bin/activate
          python -m pip install --upgrade pip
          python -m pip install -e '.[dev]'

      - name: Import Developer ID certificate
        env:
          CERTIFICATE_BASE64: ${{ secrets.APPLE_DEVELOPER_ID_CERTIFICATE_BASE64 }}
          CERTIFICATE_PASSWORD: ${{ secrets.APPLE_DEVELOPER_ID_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.MACOS_KEYCHAIN_PASSWORD }}
        run: |
          set -euo pipefail
          : "${CERTIFICATE_BASE64:?missing APPLE_DEVELOPER_ID_CERTIFICATE_BASE64}"
          : "${CERTIFICATE_PASSWORD:?missing APPLE_DEVELOPER_ID_CERTIFICATE_PASSWORD}"
          keychain_password="${KEYCHAIN_PASSWORD:-$(openssl rand -hex 24)}"
          certificate_path="${RUNNER_TEMP}/developer-id.p12"
          keychain_path="${RUNNER_TEMP}/vocalize-signing.keychain-db"
          echo "$CERTIFICATE_BASE64" | base64 --decode > "$certificate_path"
          security create-keychain -p "$keychain_password" "$keychain_path"
          security set-keychain-settings -lut 21600 "$keychain_path"
          security unlock-keychain -p "$keychain_password" "$keychain_path"
          security import "$certificate_path" \
            -P "$CERTIFICATE_PASSWORD" \
            -A \
            -t cert \
            -f pkcs12 \
            -k "$keychain_path"
          security list-keychains -d user -s "$keychain_path"
          security default-keychain -s "$keychain_path"
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s \
            -k "$keychain_password" \
            "$keychain_path"

      - name: Build, sign, notarize, and package
        env:
          APPLE_DEVELOPER_ID_APPLICATION: ${{ secrets.APPLE_DEVELOPER_ID_APPLICATION }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
        run: scripts/build-macos-release.sh --signing-mode developer-id

      - name: Verify checksums and installed artifact
        run: |
          set -euo pipefail
          zip_path="$(ls dist/release/VocalizeAI-*-macos-*.zip | head -n 1)"
          bash install/verify-release.sh dist/release/SHA256SUMS "$zip_path"
          tmp_dir="$(mktemp -d)"
          bash install/install.sh \
            --artifact "$zip_path" \
            --checksums dist/release/SHA256SUMS \
            --install-dir "${tmp_dir}/VocalizeAI" \
            --yes
          "${tmp_dir}/VocalizeAI/vocalize" --help >/tmp/vocalize-help.txt
          "${tmp_dir}/VocalizeAI/vocalize" setup \
            --non-interactive \
            --llm-api-key sk-test \
            --llm-base-url https://llm.example/v1 \
            --llm-model test-model \
            --global-command no \
            --open-browser no
          bash "${tmp_dir}/VocalizeAI/uninstall.sh" --yes
          test ! -e "${tmp_dir}/VocalizeAI"

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v7
        with:
          name: vocalizeai-macos-release
          path: |
            dist/release/VocalizeAI-*-macos-*.zip
            dist/release/SHA256SUMS
            dist/release/install.sh
          if-no-files-found: error

      - name: Publish GitHub Release assets
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.release.outputs.tag }}
        run: |
          set -euo pipefail
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" dist/release/VocalizeAI-*-macos-*.zip dist/release/SHA256SUMS dist/release/install.sh --clobber
          else
            gh release create "$TAG" \
              dist/release/VocalizeAI-*-macos-*.zip \
              dist/release/SHA256SUMS \
              dist/release/install.sh \
              --verify-tag \
              --generate-notes
          fi
