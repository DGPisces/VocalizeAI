# VocalizeAI GPU 推理节点 — 编排两个服务（SenseVoice STT + CosyVoice TTS）
#
# 设计要点（云端可移植）：
# - GPU 通过 deploy.resources.reservations.devices 声明（capabilities: [gpu]），
#   在 Windows WSL2 + NVIDIA Container Toolkit 与纯 Linux 云 GPU 实例上语义相同
# - 模型缓存挂在 ./models（外部卷）；删/重建容器不丢权重，节省 5-10 分钟下载
# - 日志挂在 ./logs；容器内 /var/log/vocalize 由 server.py 选择写不写文件（默认只 stdout，
#   容器编排层抓走，符合 12-factor）；该目录留作未来需要落盘的扩展点
# - bind 0.0.0.0：容器内监听所有接口；宿主决定暴露面
#     - Windows：用 Tailscale，仅 100.x 路由可达；可在 Windows Firewall 限制 127.0.0.1
#       + Tailscale 接口
#     - 云：换成云 LB / Security Group 控制
# - restart: unless-stopped：宿主重启或服务崩溃自动起；docker HEALTHCHECK 失败 → 重启
#
# 用法：
#   cp .env.example .env
#   # 编辑 .env
#   docker compose up -d
#   docker compose logs -f
#
# 关停：docker compose down（会发 SIGTERM，server.py 内部 graceful drain）
version: "3.8"

services:
  sensevoice:
    build:
      context: ./sensevoice
      dockerfile: Dockerfile
    image: vocalize-sensevoice:latest
    container_name: vocalize-sensevoice
    restart: unless-stopped
    env_file:
      - .env
    environment:
      # 端口：默认值与 Dockerfile 内 ENV 一致；这里再显式声明以便从 .env 覆盖
      PORT_WS: ${SENSEVOICE_PORT_WS:-8000}
      PORT_HTTP: ${SENSEVOICE_PORT_HTTP:-8080}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      MAX_CONCURRENT_SESSIONS: ${SENSEVOICE_MAX_SESSIONS:-4}
      MODEL_CACHE_DIR: /models
      HF_HOME: /models/huggingface
      HUGGINGFACE_HUB_CACHE: /models/huggingface
      MODELSCOPE_CACHE: /models/modelscope
      TORCH_HOME: /models/torch
      SENSEVOICE_DEVICE: ${SENSEVOICE_DEVICE:-cuda:0}
      AUDIO_SAMPLE_RATE: ${AUDIO_SAMPLE_RATE:-16000}
    ports:
      # 主机:容器；GPU_HOST_BIND 默认 0.0.0.0（监听所有），Windows 上建议改成
      # Tailscale 接口 IP（如 100.x.x.x）以避免 LAN 暴露。云 GPU 上由云 LB / SG 管理
      - "${GPU_HOST_BIND:-0.0.0.0}:${SENSEVOICE_PORT_WS:-8000}:${SENSEVOICE_PORT_WS:-8000}"
      - "${GPU_HOST_BIND:-0.0.0.0}:${SENSEVOICE_PORT_HTTP:-8080}:${SENSEVOICE_PORT_HTTP:-8080}"
    volumes:
      - ./models:/models
      - ./logs/sensevoice:/var/log/vocalize
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    # 容器内 HEALTHCHECK 已在 Dockerfile 里；这里不重复
    # 但显式 stop_grace_period 保证 graceful drain 完成（默认 10s 不够 SIGTERM 排空）
    stop_grace_period: 90s

  cosyvoice:
    build:
      context: ./cosyvoice
      dockerfile: Dockerfile
    image: vocalize-cosyvoice:latest
    container_name: vocalize-cosyvoice
    restart: unless-stopped
    env_file:
      - .env
    environment:
      PORT_WS: ${COSYVOICE_PORT_WS:-8001}
      PORT_HTTP: ${COSYVOICE_PORT_HTTP:-8081}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      MAX_CONCURRENT_SESSIONS: ${COSYVOICE_MAX_SESSIONS:-2}
      MODEL_CACHE_DIR: /models
      HF_HOME: /models/huggingface
      HUGGINGFACE_HUB_CACHE: /models/huggingface
      MODELSCOPE_CACHE: /models/modelscope
      TORCH_HOME: /models/torch
      COSYVOICE_MODEL_DIR: ${COSYVOICE_MODEL_DIR:-/models/cosyvoice/CosyVoice2-0.5B}
      COSYVOICE_DEVICE: ${COSYVOICE_DEVICE:-cuda:0}
      COSYVOICE_OUTPUT_SAMPLE_RATE: ${COSYVOICE_OUTPUT_SAMPLE_RATE:-24000}
      # Use the upstream bundled zero-shot prompt by default. The optional
      # ./prompts mount can still override this, but Docker Desktop/WSL can
      # occasionally present that bind as an empty read-only tmpfs.
      DEFAULT_PROMPT_WAV: ${COSYVOICE_DEFAULT_PROMPT_WAV:-/opt/CosyVoice/asset/zero_shot_prompt.wav}
      DEFAULT_PROMPT_TEXT: ${COSYVOICE_DEFAULT_PROMPT_TEXT:-希望你以后能够做的比我还好呦。}
    ports:
      - "${GPU_HOST_BIND:-0.0.0.0}:${COSYVOICE_PORT_WS:-8001}:${COSYVOICE_PORT_WS:-8001}"
      - "${GPU_HOST_BIND:-0.0.0.0}:${COSYVOICE_PORT_HTTP:-8081}:${COSYVOICE_PORT_HTTP:-8081}"
    volumes:
      - ./models:/models
      - ./logs/cosyvoice:/var/log/vocalize
      # prompts 目录挂卷，便于用户自带声纹样本（覆盖 /app/prompts/default_zh.wav）
      - ./prompts:/app/prompts:ro
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    stop_grace_period: 90s

# 注：不显式定义 networks。docker compose 默认起一个 bridge 网络，两个服务可互相
# DNS 解析（vocalize-sensevoice / vocalize-cosyvoice），但本服务对外暴露不依赖此点。
# 客户端（Pi 编排器 / Mac demo）直接通过 ${GPU_HOST}:${PORT} 访问。
